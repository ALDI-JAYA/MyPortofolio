<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Blog | Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #0f0f15; color: white; padding: 40px; }
        .admin-nav { margin-bottom: 40px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .admin-nav a { color: #bf94ff; margin-right: 20px; text-decoration: none; font-weight: bold; }
        .form-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 10px; margin-bottom: 40px; max-width: 600px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
        .btn-add { background: #bf94ff; color: black; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .blog-item { background: rgba(255,255,255,0.02); padding: 15px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
        .btn-delete { color: #ff4d4d; text-decoration: none; }
    </style>
</head>
<body>
    <div class="admin-nav">
        <a href="{{ url_for('admin_dashboard') }}">Messages</a>
        <a href="{{ url_for('admin_experience') }}">Experience</a>
        <a href="{{ url_for('admin_project') }}">Projects</a>
        <a href="{{ url_for('admin_blog') }}">Blog</a>
        <a href="{{ url_for('logout') }}" style="float:right; color:red">Logout</a>
    </div>

    <h1>Kelola Artikel Blog</h1>
    
    <div class="form-card">
        <h3>Tulis Artikel Baru (Multi-Bahasa)</h3>
        <form method="post">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" name="title" placeholder="Blog Title (IND)" required>
                <input type="text" name="title_en" placeholder="Blog Title (ENG)">
            </div>
            <textarea name="description" placeholder="Ringkasan (IND)" rows="3" required></textarea>
            <textarea name="description_en" placeholder="Summary (ENG)" rows="3"></textarea>
            <input type="text" name="date_badge" placeholder="Date Badge (e.g. JUN 20)" required>
            <input type="text" name="image_filename" placeholder="Banner Image Filename" value="project-1.png">
            <button type="submit" class="btn-add">PUBLISH ARTIKEL</button>
        </form>
    </div>

    <h2>Daftar Artikel</h2>
    {% for blog in blogs %}
    <div class="blog-item">
        <div>
            <strong>{{ blog.title }}</strong> ({{ blog.date_badge }})
        </div>
        <div class="actions">
            <a href="{{ url_for('edit_blog', id=blog.id) }}" style="color: #6e8efb; text-decoration: none; margin-right: 15px;">Edit</a>
            <a href="{{ url_for('delete_blog', id=blog.id) }}" class="btn-delete" onclick="return confirm('Hapus artikel ini?')">Hapus</a>
        </div>
    </div>
    {% endfor %}
</body>
</html>
